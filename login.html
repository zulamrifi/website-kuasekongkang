<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin — KUA Kec. Sekongkang</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{--g:#1a3a2a;--gm:#2d6a4f;--gl:#40916c;--gold:#c9a84c;--gld:#f0d080;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Tajawal',sans-serif;
      min-height:100vh;
      background:linear-gradient(160deg,var(--g) 0%,#1e4d35 50%,var(--gm) 100%);
      display:flex;align-items:center;justify-content:center;
      padding:20px;
    }
    /* Islamic pattern bg */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M30 0l8.66 5v10L30 20l-8.66-5V5zM0 15l8.66 5v10L0 35l-8.66-5V15zM60 15l8.66 5v10L60 35l-8.66-5V15zM30 40l8.66 5v10L30 60l-8.66-5V45z'/%3E%3C/g%3E%3C/svg%3E");
    }
    .login-box{
      background:rgba(255,255,255,.06);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.12);
      border-radius:24px;padding:48px 40px;
      width:min(100%,420px);
      position:relative;z-index:1;
    }
    .login-logo{
      text-align:center;margin-bottom:32px;
    }
    .logo-ring{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gld));
      display:inline-flex;align-items:center;justify-content:center;
      font-family:'Amiri',serif;font-size:28px;font-weight:700;
      color:var(--g);margin-bottom:12px;
    }
    .login-logo h1{color:white;font-size:20px;font-weight:700;margin-bottom:4px;}
    .login-logo p{color:rgba(255,255,255,.5);font-size:13px;}
    .arabic{
      font-family:'Amiri',serif;font-size:18px;color:var(--gld);
      display:block;margin-bottom:24px;text-align:center;direction:rtl;
    }
    .fgroup{margin-bottom:18px;}
    .fgroup label{display:block;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:8px;}
    .fgroup input{
      width:100%;background:rgba(255,255,255,.08);
      border:1.5px solid rgba(255,255,255,.15);
      border-radius:10px;padding:13px 16px;
      color:white;font-family:'Tajawal',sans-serif;font-size:15px;
      outline:none;transition:border .2s;
    }
    .fgroup input::placeholder{color:rgba(255,255,255,.3);}
    .fgroup input:focus{border-color:var(--gold);}
    .pw-wrap{position:relative;}
    .pw-wrap input{padding-right:46px;}
    .pw-toggle{
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);font-size:18px;
      transition:color .2s;
    }
    .pw-toggle:hover{color:var(--gld);}
    .btn-login{
      width:100%;padding:14px;
      background:linear-gradient(135deg,var(--gold),var(--gld));
      color:var(--g);font-weight:800;font-size:16px;
      border:none;border-radius:12px;cursor:pointer;
      font-family:'Tajawal',sans-serif;
      transition:all .3s;margin-top:8px;
    }
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(201,168,76,.4);}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .error-msg{
      background:rgba(252,129,129,.15);border:1px solid rgba(252,129,129,.3);
      color:#fc8181;border-radius:10px;padding:12px 16px;
      font-size:13.5px;margin-bottom:16px;display:none;
    }
    .back-link{
      display:block;text-align:center;margin-top:20px;
      color:rgba(255,255,255,.4);font-size:13px;text-decoration:none;
      transition:color .2s;
    }
    .back-link:hover{color:rgba(255,255,255,.7);}
    .spinner{
      display:inline-block;width:18px;height:18px;
      border:2px solid rgba(26,58,42,.4);border-top-color:var(--g);
      border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="logo-ring">KUA</div>
    <h1>Panel Admin</h1>
    <p>KUA Kecamatan Sekongkang</p>
  </div>
  <span class="arabic">بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ</span>

  <div class="error-msg" id="errMsg"></div>

  <div class="fgroup">
    <label>Email Admin</label>
    <input type="email" id="emailInput" placeholder="admin@kuasekongkang.id" autocomplete="email"/>
  </div>
  <div class="fgroup">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password"/>
      <button class="pw-toggle" type="button" onclick="togglePw()" id="pwEye">👁</button>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Masuk ke Panel Admin</button>
  <a href="index.html" class="back-link">← Kembali ke Website</a>
</div>

<!-- Firebase -->
<script src="firebase-init.js"></script>
<script type="module">
  import { initializeApp }             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);

  // Already logged in → go to admin
  onAuthStateChanged(auth, user => {
    if (user) window.location.href = 'admin.html';
  });

  window.doLogin = async function() {
    const email = document.getElementById('emailInput').value.trim();
    const pw    = document.getElementById('pwInput').value;
    const btn   = document.getElementById('loginBtn');
    const err   = document.getElementById('errMsg');

    if (!email || !pw) { showErr('Mohon isi email dan password.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Memproses...';
    err.style.display = 'none';

    try {
      await signInWithEmailAndPassword(auth, email, pw);
      window.location.href = 'admin.html';
    } catch(e) {
      const map = {
        'auth/user-not-found':'Email tidak terdaftar.',
        'auth/wrong-password':'Password salah.',
        'auth/invalid-email':'Format email tidak valid.',
        'auth/too-many-requests':'Terlalu banyak percobaan. Coba lagi nanti.',
        'auth/invalid-credential':'Email atau password salah.',
      };
      showErr(map[e.code] || 'Login gagal: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Masuk ke Panel Admin';
    }
  };

  function showErr(msg){
    const el = document.getElementById('errMsg');
    el.textContent = msg; el.style.display = 'block';
  }

  // Enter key
  document.addEventListener('keydown', e => { if(e.key==='Enter') window.doLogin(); });
</script>
<script>
  function togglePw(){
    const i = document.getElementById('pwInput');
    i.type = i.type==='password' ? 'text' : 'password';
  }
</script>
</body>
</html>
